body:
  text: 卷下足太陽膀胱經之圖足太陽膀胱經歌足太陽膀胱之經頭走脊而脊走足是經多血少氣起於睛明止於至陰計六十三穴左右共一百二十六穴膀胱重九兩二銖縱廣九寸居腎下之前大腸之側當臍上一寸水分穴之處小腸下口乃膀胱上際也水腋由是滲入焉足太陽屬膀胱經起自目眥由睛明上行攢竹神庭穴督太陽經並曲差五處承光額二十五通天從左脈交行百會右耳尖靈樞第十篇云足太陽之脈起於目內眥上額交巔滑氏曰目大角為內眥髮際前為額腦上為巔巔頂也足太陽起目內眥睛明穴上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右相交於巔上之百會也神庭百會俱見督脈俱足太陽督脈之交會也睛明在目內眥頭外畔宛宛中手足太陽陽明少陽之會禁灸攢竹在兩眉頭陷中禁灸曲差取神庭外旁臨泣之裡二穴之間髮際內五分臨泣見足少陽經五處在上星旁曲差後五分承光取曲差後二寸禁灸通天取曲差後二寸五分右脈仍從百會出耳角入髮際五分率谷浮白連竅陰乃足太陽少陽會從茲三穴散諸經靈樞第十篇云其支者從巔至耳上角滑氏曰支別者從巔之百會抵耳上角過率谷浮白竅陰所以散養於經脈也率谷浮白竅陰三穴見足少陽經足太陽少陽之會也其經再自通天項絡卻直行來玉枕循行腦戶選周傍足太陽同督脈並別循出腦還本經下項復從天柱仍靈樞第十篇云其直者從巔入絡腦還出別下項滑氏曰腦頭髓也頸上為腦腦後為項此直行者由通天穴後循絡卻玉枕入絡腦復出下項抵天柱也腦戶見督脈足太陽督脈之會絡卻在通天後一寸五分玉枕在絡卻後一寸五分或取後項上入髮際三寸腦戶旁一寸三分枕骨起肉天柱在頸項大筋外廉夾項後髮際陷中大椎手足三陽會卻循陶道兩行大杼風門皆夾脊肺俞厥陰四椎極心膈肝膽脾胃連三焦腎俞同臍直十六八椎大小腸膀胱十九椎兩旁中膂內俞白環入膂絡胃由膀胱靈樞第十篇云循肩膊內挾脊抵腰中入循膂絡腎屬膀胱滑氏曰肩後之下為肩膊椎骨為脊尻上橫骨為腰挾脊為膂自天柱而下過大椎陶道卻循肩膊內挾脊兩旁下行歷大杼風門肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞由是抵腰中入循膂絡腎下屬膀胱也大椎見督脈手足三陽督脈之會陶道見督脈足太陽督脈之會大杼在項後第一椎下兩旁各一寸五分陷中足少陽之會又骨會此夾脊第二行俞穴風門在第二椎下督脈之會兩旁各一寸五分肺俞在第三椎下兩旁各一寸五分厥陰俞在第四椎下兩旁各一寸五分心俞在第五椎下五旁各一寸五分膈俞在第七椎下兩旁各一寸五分肝俞在第九椎下兩旁各一寸五分膽俞在第十椎下正坐取之兩旁各一寸五分脾俞在第十一椎下兩旁各一寸五分胃俞在第十二椎下兩旁各一寸五分三焦俞在第十三椎下兩旁各一寸五分腎俞在第十四椎下與臍平兩旁各一寸五分大腸俞在第十六椎下兩旁各一寸五分小腸俞在第十八椎下兩旁各一寸五分膀胱俞在第十九椎下兩旁各一寸五分中膂內俞在第二十椎挾脊起肉兩旁各一寸五分白環俞在二十椎下伏取之禁灸自大杼循肩膊至白環俞抵腰中去脊中各一寸五分其支別從白環入下循腰髁夾其脊上髎次髎中下髎會陽穴旁陰尾骨貫穿臀內下承扶殷門浮郄委陽途膕中只是委中穴靈樞第十篇云其支者從腰中下挾脊貫臀入膕中滑氏支下有別字腰中下下無挾脊二字滑氏曰臀尻也挾腰臗骨兩旁為機機後為臀腓腸上膝後曲處為膕其支別者從腰中循腰髁下挾脊歷上髎次髎中髎下髎會陽下貫臀至承扶殷門浮郄委陽入膕中之委中穴也按腰髁即腰監骨人脊椎骨有二十一節自十六椎節而下為腰監骨扶脊附著之處其十七至二十空云云也會陽在尾髎骨兩旁則二十一椎乃復見而終焉又按督脈當脊中起於長強在二十一椎下等而上之至第十六椎下為陽關穴其二十椎至十七椎皆無穴乃知為腰監骨所掩明矣上髎在第一空腰髁下一寸挾脊陷中足太陽少陽之絡次髎在第二空夾脊陷中中髎在第三空挾脊陷中足厥陰少陽所結下髎在第四空挾脊陷中足太陽厥陰所結會陽在陰尾髎骨兩旁承扶在尻臀下股陰上紋中殷門在肉郄下六寸浮郄在委陽上一寸展膝得之委陽在承扶下六寸屈身取之足太陽之後出於膕中外廉兩筋間委中在膕中央約文中動脈伏面挺腹至地取之血郄也此支自夾脊第二行至白環俞而入歷上下髎循會陽直至委中與附分至秩邊者合共會於委中別支天柱膊中鋪別行左右附分去貫穿伸膂來魄戶膏肓穴下循神堂譩譆膈內七椎數魂門第九近陽綱意舍前行取胃倉肓門又勒接志室胞肓直抵秩邊藏靈樞第十篇云其支者從膊內左右別下貫胂挾脊內過髀樞滑氏曰膂內曰胂夾脊肉也其支者為挾脊兩旁第三行相去各三寸之諸穴自天柱而下從膊內左右別行下貫胂膂歷附分魄戶膏肓神堂譩譆膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊下歷尻臀過髀樞也股外為脾楗骨之下為髀樞附分在第二椎下附項內廉正坐取之手足太陽之會夾脊第三行俞穴魄戶在第三椎下兩旁各三寸正坐取之膏肓在第四椎下近第五椎上兩旁各三寸取穴時令人正坐曲脊伸兩手以臂著膝前令端直手大指與膝頭齊以物支肘母令臂動搖離胂骨容側指許按之痠痛神堂在第五椎下兩旁各三寸正坐取之譩譆在肩膊內廉第六椎下兩旁各三寸正坐取之膈關在第七椎下兩旁各三寸正坐闊肩取之魂門左第九椎下兩旁各三寸陷中正坐取之陽綱在第十椎下兩旁各三十陷中正坐取之意舍在第十一椎下兩旁各三十陷中正坐取之胃倉在第十二椎下兩旁各三寸肓門在第十三椎下兩旁各三寸又肋間陷中志室在第十四椎下兩旁各三寸陷中並正坐取之胞肓在第十九椎下兩旁各三寸伏而取之秩邊在第二十椎下陷中兩旁各三寸伏而取之或云在第二十一椎下此支復自天柱而下歷附分至此而穴終由此穴循本絡直注於委中合經從秩邊貫臀內髀樞穴內承山外旁廂一寸五分間髀從裡廉委中會合陽膝約下二寸貫穿腨內承筋䪼承筋正在腨腸中下至承山腸肉分飛揚外踝七寸存附陽踝下循崑崙僕參申脈白肉際金門京骨足邊屯足外大骨赤白肉小指本節收束骨通谷之前出至陰交足少陰腎經脈靈樞第十篇云循髀外後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側滑氏曰腨腓腸也循髀外後廉髀樞之裡承扶之外一寸五分之間而下與前之入膕中者相合下行循合陽穴下貫腨內歷承筋承山飛揚附陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小指外側端之至陰穴以交於足少陰也合陽在膝約文中央下三寸或取委中下三寸承筋在腨腸中央陷中承山在兌腨腸下分肉間陷中飛陽在足外踝上七寸太陽之絡別走太陰附陽在足外踝上二寸太陽前少陽後筋骨間陽蹺之郄崑崙在足外後跟骨上陷中僕參在跟骨下陷中拱足得之申脈在外踝下陷中容爪甲白肉際陽蹺脈之所生金門在足外踝下太陽之郄陽維所屬京骨在足外側大骨下赤白肉際陷中束骨在足小指外側本節後陷中通谷在足小指外側本節前陷中至陰在足小指外側去爪甲角如韭葉總歌曰內眥交巔方下項循肩挾脊抵腰中從腰絡腎膀胱過髀骨源流小指通愚按足太陽膀胱之脈起於目內眥睛明穴上額交巔抵天柱過大椎挾脊下行循膂絡腎屬膀胱其支者從腰入膕中其支別者復自天柱從膊內左右挾脊而下合膕中出小指外側端至陰穴長交於足少陰腎故足少陰之脈起於小指之下斜趣足心湧泉穴始也穴歌曰足太陽經六十三睛明攢竹曲差參五處承光上通天絡卻玉枕天柱嶄大杼風門引肺俞厥陰心俞膈俞注肝俞膽俞脾俞同胃俞三焦腎俞中大腸小腸膀胱俞中膂白環兩俞輸自從大杼至白環相去脊中三寸間上髎次髎中復下會陽承扶殷門亞浮郄委陽委中罅膊內挾脊附分當太陽行背第三行魄戶膏肓與神堂譩譆膈關魂門旁陽綱意舍仍胃倉育門志室胞之肓二十椎下秩邊藏合膕以下合陽是承筋承山居其次飛陽附陽泊崑崙僕參申脈連金門京骨束骨又通谷小指外側至陰續是動所生歌曰是經血多氣猶少是動頭疼不可當項如拔兮腰似折髀強痛徹脊中尖膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小指廢頭囟頂痛目色黃腰尻膕腳疼連背淚流鼻衄及顛枉靈樞第十篇云是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂顛疾頭囟頂痛目黃淚出鼻衄項背腰尻膕腨腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也音釋竅杼膂音呂脊骨兩旁髁苦瓦反腰骨臀音屯髀也郄膕戈麥反曲腳也膊補合反噫音依痛聲也嘻音熙痛聲也腨時充反音喘尻若高反足少陰腎經之圖足少陰腎經歌足少陰腎之經足走腹而腹走胸是經多氣少血起於湧泉止於俞府計二十七穴左右共五十四穴腎有兩枚狀如石卯色黑紫當胃下兩旁入脊膂附脊之第十四椎前後與臍平足少陰經起足心靈樞第十篇云足少陰之脈起於小指之下斜趣足心滑氏曰趣向也足少陰起小指之下斜向足心之湧泉也湧泉然谷太谿深別入跟中大鐘穴照海須從內踝尋水泉之穴循踝內行上厥陰太陽外復溜相連交信來少陰之前太陰背踝上三寸三陰交內循上腕築賓高出膕內廉至陰谷大小筋內尋其凹靈樞第十篇云出然谷之下循內踝之後別入跟中上腨內出膕內廉滑氏曰跟足跟也由湧泉轉出足內踝然谷穴下循內踝後太谿穴別人跟中之太鍾照海水泉乃折自太鍾之外上循內踝行厥陰太陰之後經復溜交信過三陰交上腨內循築賓出膕內廉抵陰谷也三陰交見足太陰足三陰經之交會也湧泉在足心宛宛中屈足卷指取之然谷在足內踝前起大骨下陷中太谿在足內踝後跟骨上動脈陷中太鍾在足跟後沖中少陰之絡別走太陽照海在足內踝下陰蹺脈之所生水泉在內踝下太谿下一寸少陰之郄復溜在內踝上二寸動脈陷中交信在足內踝上二寸少陰前太陰後廉前筋骨間築賓在內踝上腨分中陰谷在膝內輔骨後大筋下小筋上動脈按之應手屈膝乃得之上股後廉長強位督脈絡繞在脊骶足少陰連足少陽卻循橫骨沿毛際大赫血氣四滿外中注之上肓俞分平臍左右各寸半會屬循臍腎命門下騰關元會中極乃足三陰共任脈絡繞膀胱屬腎經靈樞第十篇云上股內後廉貫脊屬腎絡膀胱滑氏曰由陰谷上股內後廉貫脊會於脊之長強穴還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍下過關元中極而絡膀胱也長強見督脈足少陰少陽所結會督脈別絡也關元中極並見任脈足三陰任脈之會橫骨在大赫下一寸肓俞下五寸千金云大赫在氣穴下一寸或取肓俞下四寸氣穴在四滿下一寸或取肓俞下三寸衝脈之會一名胞門一名子戶四滿在中注下一寸氣海旁一寸或取肓俞下二寸中注在一寸衝脈之會肓俞在商曲下一寸去臍旁五分衝脈之會橫骨至肓俞去中行各一寸五分其支再從肓俞出上臍商曲石關騰一寸陰都通谷行貫穿肝部幽門過巨闕旁廂各五分上膈斜經步廊穴一寸六分要分別神封向上是靈墟仰取神藏彧中接更有俞府在胸堂正在璇璣二寸旁從前循向人迎去上項沿喉舌本藏靈樞第十篇云其直者從腎上貫肝膈入肺中循喉嚨挾舌本滑氏曰其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏或中俞府而上循喉嚨並人迎挾舌本而終也人迎見足陽明經商曲取幽門下四寸肓俞上一寸衝脈之會石關在陰都下一寸衝脈之會陰都在通谷下一寸衝脈之會通谷在幽門下一寸衝脈之會自商曲至通谷去腹中行各五分幽門挾巨闕旁各五分見上門衝脈之會步廊在神封下一寸六分陷中或取俞府下八寸神封在靈墟下一寸六分陷中或取俞府下六寸四分靈墟在神藏下一寸六分陷中或取俞府下四寸八分神藏在或中下一寸六分陷中或取俞府下三寸二分彧中在俞府下一寸六分陷中自步廊至去胸中行各二寸並仰而取之俞府在巨骨下璇璣旁支經橫自神藏發絡心正向膻中治膻中兩乳直胸中交手厥陰心包絡靈樞第十篇云其支者從肺出絡心注胸中滑氏曰兩乳間為胸中支者自神藏別出繞心注胸之膻中以交於手厥陰也總歌曰腎經足底斜循踝出膕還從股後逢貫脊絡腸方屬腎上行俠舌散胸中愚按足少陰腎之脈起於小指之下斜趣足心終於胸中俞府其支別者復自神藏橫出繞心注膻中交於手厥陰心包絡經故手厥陰之脈起於胸中出脅下腋三寸天池穴也穴歌曰足少陰經二十七湧泉然谷太谿溢太鍾照海通水泉復溜交信築賓連陰谷橫骨大赫赫氣穴四滿中注立肓俞商曲石關樽接都通谷幽門僻步廊神封靈墟位神藏彧中俞府既是動所生歌曰是經多氣而少血是動病飢不欲食喘嗽唾血喉中鳴坐而欲起面如漆目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊痛心腸煩痛疸而澼痿厥嗜臥體怠惰足下熱痛皆腎厥靈樞第十篇云是動則病飢不欲食麵如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將補之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶被髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也滑氏面下有黑字漆柴易地色二字為字易謂字澼作癖字脊下有臀字手厥陰心包經之圖手厥陰心包絡經歌手厥陰心包絡之經腦走腋而腋走手是經多血少氣起於天池止於中衝計九穴左右共一十八穴心包一名手心主以藏象校之在心下橫膜之上堅膜之下與橫膜相黏而黃脂漫裹者心也其漫脂之外有細筋膜如絲與心肺相連者心包也或問手厥陰經曰心主又曰心包絡何也曰君火以名相火以位手厥陰代君大行事以用而言故曰手心主以經而言則曰心包絡一經面二名實相火也心主心包手厥陰如絲箸膜肺連心脈從胸中心包會下膈三焦臍下停靈樞第十篇雲手厥陰之脈起於胸中出屬心包下膈歷絡三焦滑氏曰手厥陰受足少陰之交起於胸中出屬心包由是下膈歷絡於三焦之上脘中脘及臍下一寸下焦之分也其支又自心包走橫出循胸來乳後一寸天池厥肋間循腋天泉循臑肘前行尺澤肘紋空靈樞第十篇云其交者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中滑氏曰脅上際為腋自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉穴介乎太陰少陰兩經之中間入肘中之曲澤也天池在乳後一寸腋下三寸著脅直腋撅肋間足少陽之會天泉在曲腋下去臂二寸舉臂取之曲澤在肘內廉下陷中屈肘取之直行下臂兩筋中郄門間使內關去大陵自掌來勞宮惟有中衝在中指靈樞第十篇云下臂行兩筋之間入掌中循中指出其端滑氏曰由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮穴循中指出其端之中衝去郄門在掌後去腕寸厥陰之郄間使在掌後三寸兩筋間陷中內關在掌後去腕二寸或取惠人三指橫加掌後腕上以中指之下當中兩筋間陷中大陵在掌後兩筋間陷中勞宮在掌中央動脈中屈無名指取之厥陰少陽絡穴也中衝在手中指端去爪甲如韭葉其支別自勞宮起出掌循行次指端交手少陽三焦位靈樞第十篇云其支別者從掌中循小指次指出其端滑氏曰小指次指無名指也自小指逆數之則為次指云支別者自掌中勞宮定別行循小指次指出其端而交於手少陽也總歌曰氣自胸中何所注心包由始對三焦其注入中衝入指標愚按手厥陰心包絡之脈起於胸中終於手中指中行穴其支別者復自掌中勞宮穴別行循小指之表端長三尺交於手少陽三焦經故手少陽之脈起於手小指次指之表端關衝穴始也穴歌曰九穴心包手厥陰天池天泉曲澤深郄門門使內關去大陵勞宮中衝臨是動所生歌曰是經少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿結心中澹澹或大動善笑目黃面赤色所生病者為煩心心痛掌中熱即生靈樞第十篇云是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中澹澹大動面赤目黃喜笑不休是生脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也音釋撅居越反手少陽三焦經之圖手少陽三焦經手少陽三焦之經手走肩而肩走是經多氣少血起於關衝止於絲竹空計二十三穴左右共四十六穴三焦者水穀之道路氣之所終始也上焦在心下下膈在胃上口其治在膻中直兩乳間陷者中中焦在胃中脘當臍上四寸不上不下其治在臍旁下焦當膀胱上口其治在臍下一寸手少陽經三焦儔關衝液門中渚流陽池上臂外關透別走心主名支溝會宗空處三陽絡四瀆肘前天井泊靈樞第十篇雲手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘滑氏兩指作次指滑氏曰臂骨盡處為腕臑盡處為肘手少陽起小指次指端關衝穴上出次指之間歷液門中渚循手表腕之陽池出臂外兩骨之間循外關支溝會宗三陽絡四瀆乃上貫肘抵天井穴也關衝在手表小指次指之端去爪甲如韭葉液門在手表小指次指間陷中中渚在手表小指次指本節後間陷中陽池在手表腕上陷中禁灸外關在手表腕後二寸陷中少陽之絡別走手心主支溝在手表腕後三寸兩骨間陷中會宗在手表腕後三寸空中一寸三陽絡在臂上大交脈支溝上一寸四瀆在肘前五寸外廉陷中天井在肘外或大骨後上一寸兩筋間陷中屈肘取或義手按膝頭取之兩筋骨罅上臑臑外清冷淵肩肘腋斜是消濼上肩臑會共肩髎更有天髎毖骨高秉風手足三陽後肩井橫量三指滔陽維手足少陽會竟入缺盆膻中去散走絡繞心包行遍屬三焦石門募靈樞第十篇云循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦滑氏肩下無而字布字作交字循字作遍字滑氏曰肩肘之間膊下對腕處為臑從天井上行循臂臑之外歷清冷淵消濼行手太陽之裡陽明之外上肩循臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而交會於膻中散布絡繞於心包乃下膈當胃上口以屬上焦於中腕以屬中焦於陰交以屬下焦也秉風見手太陽經手足少陽手太陽陽明之會肩井見足少陽經手足少陽陽維之會缺盆足陽明經穴膻中見任脈心包相火用事之分也中脘陰交見任脈三焦之募任脈氣所發也清冷淵在肘上二寸伸肘舉臂取之消濼在肩下臂外腋斜肘分下行手太陽脈之裡陽明脈之外臑會在肩前廉去肩頭三寸手陽明之絡肩髎在肩端臑上陷中舉臂取之天髎在肩缺盆中上毖骨之際陷中央手少陽之絡陽維之會其支又自膻中移缺盆上項來大椎手足三陽督脈會橫循天牖經懸釐頷厭手足少陽會翳風瘈脈斜行耳顱息青筋上角孫陽白睛明歸囟眥手足太陽與少陽陽明五脈會晴旁回循下額至於䪼顴髎兌骨陷中藏靈樞第十篇云其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼滑氏系字作挾字滑氏曰腦戶後為項目下為䪼其支者從膻中而上出缺盆之外上項過大椎循天牖上挾耳後經翳風瘈脈顱息直上出耳上角至角孫過懸釐頷厭及過陽白晴明屈曲下頰至䪼會顴髎之分也大椎見督脈手足三陽督脈之會懸釐頷厭見足少陽經手足陽明少陽之交會也陽白見足少陽經手足陽明少陽之會晴明見足太陽經顴髎見手太陽經手少陽太陽之會也天牖在頸大筋外缺盆上天窗後天柱前完骨下發際上天窗資生經作天容翳風在耳後尖角陷中按之引耳中痛手足少陽之會瘈脈在耳本後雞足青絡中在耳後青脈中角孫在耳郭中間上問口有空手足少陽之會其支別從耳後起再自翳風穿入耳聽宮即是耳中珠二陽少陽三脈聚耳門缺當和髎親瞳子髎懸皆五分絲竹空居眉後陷交足少陽之膽經靈樞第十篇云其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥滑氏入耳中中字下有卻字無走耳前過客主人前交頰十字目銳眥目外眥也滑氏曰此支從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目銳眥會瞳子髎循絲竹空而交於足少陽也聽宮見手太陽經手足少陽手太陽三脈之會瞳子髎見足少陽經手太陽手足少陽之會耳門在耳前起肉當耳缺中和髎在耳前兌發下橫動脈絲竹空一名目髎在眉後陷中總歌曰關衝流注方循腕過肘交肩下缺盆散絡心包還上項至於銳眥卻歸源愚按手少陽三焦之脈起於手小指次指之表端終於眉後陷中絲竹空其支別者復自和髎別行至目銳眥長五尺交於足少陽膽經故足少陽脈起於目銳眥瞳子髎穴始也穴歌曰手中少陽是三焦關衝液門中渚朝陽池外關支溝引會宗三陽四瀆豪天井清冷淵消濼臑會肩髎天髎各天牖翳風瘈脈連顱息角孫耳門樂和髎絲竹空共全二十三穴並無錯是動所生歌曰是經少血還多氣是動耳鳴喉腫痹所生病者汗自出耳後痛兼目銳眥肩臑肘臂外眥疼小指次指亦如廢靈樞第十篇云是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也音釋濼毖釐頷足少陽膽經之圖足少陽膽經歌首頁佚瞳子髎在目外五分手太陽之會聽會在耳前陷中上關下一寸動脈宛宛中張口得之客主人耳前起骨上廉開口有空動脈宛宛中側臥張口取足陽明會一名上關某針頷厭在曲周下腦空上廉手足少陽陽明之交會懸顱在曲周上腦空中懸釐在曲周上腦空下廉手足少陽陽明之交會曲鬢取耳上將耳掩前對耳尖髮際曲曲陷中鼓頷有空足太陽之會率谷在耳上如前三分入髮際一寸五分陷者宛宛中嚼而取之足太陽之會天衝在耳上如前三分耳後髮際二寸浮白在耳後入髮際一寸足太陽之會竅陰在完骨上枕骨下搖動有空足太陽之會完骨在耳後入髮際四分本神在曲差旁一寸五分耳上入髮際四分陽維之會陽白在眉上一寸直目瞳子陽維之會臨泣在眉上直入髮際五分陷中直目瞳子足太陽之會目窗在臨泣後一寸或取眉上入髮際一寸五分直目瞳子陽維之會正營在目窗後一寸或取眉上入髮際二寸五分直目瞳子陽維之會承靈在正營後一寸五分或取眉上入髮際四寸夾玉枕骨上陽維之會腦空在承靈後一寸五分夾玉枕骨下陷中陽維之會風池在腦空後髮際陷中夾風府兩旁陽維之會循頸行來至天牖還從肩井穴中過手足陽明少陽後大椎手足三陽督大迎太陽少陽足秉風手足四陽交前項缺盆下胸腹靈樞第十篇云循頸行手少陽之前至肩上卻交手手少陽之後入缺盆滑氏交出下無手字滑氏曰自風池循頸過天牖穴行手少陽脈之前下至肩上循肩井卻左右相交出手少陽之後過大椎大杼秉風當秉風前入缺盆之外天牖見手少陽經大椎見督脈手足三陽督脈之會大杼見足太陽經足太陽少陽之會秉風見手太陽經手太陽陽明手足少陽之會缺盆見足陽明經肩井在肩上陷中缺盆上大骨前一寸五分三指按取中指下陷中手中少陽陽維之會其支別向耳之中穴自懸釐過翳風循出聽宮並聽會瞳髎銳眥後方終靈樞第十篇云其支者從耳後入耳中出走耳前至目銳眥後滑氏曰其支者從耳後顳顬間過翳風之分入耳中過聽宮出走耳前復自聽會至目銳眥瞳子髎之分也翳風見手少陽經手足少陽之會聽宮見手太陽經手足少陽太陽三脈之會聽會瞳子髎見前別支再起銳眥側大迎顴髎頰車驀下頰循還本路前以合缺盆下胸臆天池貫膈自期門足太陰經會厥陰就屬膽募到日月太陽少陽陽維臨靈樞第十篇云其支者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽滑氏其支者別別下有目字大迎合合下無於字手少陽陽下無抵於二字合缺盆盆下無以字滑氏曰其支者別自目外瞳子䪼而下大迎合干少陽於䪼當顴髎穴之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也大迎見足陽明經顴髎頰車見手太陽經天池見手心主手厥陰足少陽之會期門見足厥陰日月見下文膽之募也循脅章門氣衝出繞毛髀厭環跳入靈樞第十篇云循脅裡出氣沖繞毛際橫入髀厭中滑氏曰脅怯也腋下為脅曲骨之分為毛際毛際兩旁動脈中為氣衝捷骨之下為髀厭即髀樞也自屬膽處循脅內章門之裡出氣沖繞毛際遂橫入髀厭中厭中之環跳也章門見足厥陰經足少陽厥陰之會氣衝見足陽明經環跳在髀樞中其直依然自缺盆下腋循胸至淵腋輒筋日月至章門季脅還從帶脈行更有五樞維道穴居髎卻與上髎分中髎夾脊長強骶足少陰陽相結會合於環跳髀樞中太陽經內陽明外中瀆陽關犢鼻偏出行膝內陽陵泉靈樞第十篇云其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉滑氏曰脅骨之下為季脅此直者從缺盆直下腋循胸歷淵腋輒筋日月穴過季脅循京門帶脈五樞維道居髎由居髎入上髎中髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉也上髎中髎並見足太陽經上髎為足少陽太陽之絡中髎則足少陰少陽所結之會也長強見督脈足少陰少陽所結之會犢鼻見足陽明經淵腋在腋下三寸宛宛中舉臂取之禁灸輒筋在腋下三寸腹前一寸著脅陷中日月在期門五分足太陽陽維之會膽之募也京門在臨骨下腰中季肋本夾脊腎之募也帶脈在季肋下一寸八分五樞在帶脈下三寸或云水道旁一寸五分維道在章門下五寸三分帶脈之會居髎在章門下八寸三分監骨上陷中陽蹺之會環跳在髀樞中側臥伸下足屈上足取硯子骨宛宛中中瀆在髀骨外膝上五寸分肉間陷中少陽之絡陽關在陽陵泉上三寸犢鼻外陷中禁灸犢鼻見足陽明經陽陵泉在膝下一寸外廉陷中蹲地取尖骨前乃筋之會下循陽交外丘穴光明陽輔骨如前經行懸中來髁內丘虛臨泣地五會俠谿岐骨竅陰中靈樞第十篇云下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間滑氏曰䯒外為輔骨外踝以上為絕骨足面為跗自陽陵泉下外輔骨前歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣地五會俠谿乃上入小指次指之間至竅陰而終也陽交在足外踝上七寸斜屬二陽分肉之間陽維之郄外丘在足外踝上七寸光明在足外踝上五寸少陽絡別走厥陰陽輔在足外踝上四寸輔骨前絕骨端如前三分去丘墟七寸懸鐘丘墟在足外踝下如前陷中去臨泣三寸臨泣在足小指次指本節後間陷中去俠谿一寸五分禁灸地五會在足小指次指本節後陷中去俠谿一寸俠谿在足小指次指岐骨間本節後陷中竅陰在足小指次指之端去爪甲如韭葉當有別支臨泣遞沿跌橫入岐骨間貫甲三毛大指端其名只是大敦穴交足厥陰經屬肝羒蔪第十篇云其支者別跗上入大指循岐骨內出其端還貫入爪甲出三毛滑氏曰足大指本節後為岐骨大指爪甲後為三毛其支者自足跗上臨泣穴別行入大指循岐骨內出大指端還其入爪甲出三毛交於足厥陰也總歌曰銳眥交巔行耳後缺盆假道絡於肝下循髀厭方流膝更過三毛出指端愚按足少陽膽之脈起於目銳皆瞳子髎終於足小指次指之端竅陰穴也其支別者復自跗上臨泣穴別行足大指之端長八尺交於足厥陰肝經故足厥陰之脈起於足大指端三毛中大敦穴始也穴歌曰少陽足經瞳子髎四十三穴行迢迢聽會客主頷厭集懸顱懸釐曲鬢翹率谷天衝浮白次竅陰完骨本神企陽白臨泣開目窗正營承靈腦空繼風池肩並淵液長輒筋日月京門當帶脈五樞維道續居髎環跳下中瀆陽關陽陵復陽交外丘光明陽輔高懸鐘丘墟足臨泣地五俠谿竅陰畢此經前圖內頭部自瞳子髎至風池凡二十穴作三折向外而行始瞳子髎至完骨是一折又自完骨外折上至陽白會睛明是一折又是睛明上行循臨泣風池是一折綠其穴曲折外多難為科牽故此作一至二十次第以該之一瞳子髎二聽會三客主人四頷厭五懸顱六懸釐七曲鬢八率谷九天衝十浮白十一竅陰十二完骨十三本神十四陽白十五臨泣十六目窗十七正營十八承靈十九腦空二十風池是動所生歌曰此經多氣及少血是動口若善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連銳眥缺盆腫痛並兩腋馬力挾癭生兩旁汗出振寒痎瘧疾胸脅髀膝至䯒骨絕骨踝痛及諸節靈樞第十篇云是動則病口若善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是為陽厥是是骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也滑氏面微下無有字腋下腫腫作瘇字足厥陰肝經之圖足厥陰肝經歌足厥陰肝之經足走腹而腹走目是經多血少氣起於大敦止於期門計一十三穴左右共二十六穴肝之為藏左三葉右四葉凡七葉其治在左其藏在右脅右腎之前並胃著脊之第九椎足厥陰經起聚毛大敦行間大沖超中封內踝前半寸靈樞第十篇云足厥陰之脈起於大指聚毛之際上循足跗上廉去內踝一寸滑氏曰足大指爪甲後為三毛三毛後橫文為聚毛去相去也足厥陰起於大指聚毛之大敦穴循足跗上廉歷行間大沖抵內踝一寸之中封也大敦在足大指端去爪甲如韭葉及三毛中行間在足大指間動脈應手陷中大沖在足大指本節後三寸或云一寸五分許骨罅陷中動脈應手中封取足內踝前一寸斜行陷中仰而取之使逆則宛使和則通搖足而得之上踝三寸三陰交蠡溝中都䯒骨里八寸交出太陽際膝關眼內來曲泉靈樞第十篇云上踝八寸交出太陰之後上膕內廉滑氏曰自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉三陰交見足太陰經足少陰太陰厥陰之交會也蠡溝在內踝上五寸厥陰之絡中都在內踝上七寸䯒骨中與少陰相直膝關在犢鼻下二寸陷中犢鼻見足陽明經曲泉在膝內輔骨下大筋上小筋下陷中屈膝得之在膝橫文頭是循股陰包經五里陰廉動脈至衝門府舍循行繞陰器小腹上來曲骨端舉經相會脈𨇅仕中極三陽任脈部上自關元應過腹章門臍直季脅端直入期門屬肝募繞膽循募依日月靈樞第十篇云循股陰入毛中過陰器抵小腹抉胃屬肝絡膽滑氏作循股入陰中環陰器滑氏曰髀內為股臍下為小腹由曲泉上行循股內之陰包五里陰廉遂當衛門府舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元筱循章門至期門之所挾胃屬肝下日月之分絡於膽也衝門府舍見廷太陰曲骨見任脈足厥陰任脈之會中極關元見任脈足三陰任脈之會也日月見足少陽經陰包在膝上四寸股內廉兩筋間足厥陰別走五里在氣衝下三寸陰股中動脈陰廉在羊矢下去氣衝二寸動脈中章門大橫外側臥屈上足伸下足舉臂取或臍上二寸兩旁各四寸半少陽會脾募藏會期門取巨闕兩旁各四寸半直乳下寸半第二肋端動脈足厥陰太陰陰維之會肝募也貫穿胸膈食竇穴淵腋三寸是大包三寸裡間是布脅雲門直入至人迎扶結喉旁寸五分喉升升入是頏顙大迎骨陷地倉行四白陽白上眉去瞳子髎旁連目系出額臨泣發五分督脈相連逢百會靈樞第十篇云上貫膈布脅肋循喉嚨之後上入頏顙連目繫上出額與督脈會於巔滑氏曰目內連深處為目系頏顙咽顙也自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵腋之間人迎之外循喉嚨之後上入頏顙行大迎地倉四白陽白之外連目繫上出額行臨泣之裡與督脈相會於巔頂之百會也食竇大包足太陰經穴雲門見手太陰經淵腋見足少陽經人迎大迎地倉四白見足陽明經陽白臨泣見足少陽經百會見督脈復從目系頰還唇靈樞第十篇云其支者從目系下頰裡環唇內滑氏曰前此連目繫上出額此支從目系下行任脈之外本經之裡下頰裡交環於口唇之內別支貫膈自期門食竇外廂本經去交手太陰之肺經靈樞第十篇云其支者復從肝別貫膈上注肺滑氏曰此交經之支從期門屬肝處別貫膈行食竇之外本經之裡上注肺中下行至中焦挾中脘之分以交於手太陰也食竇見足太陰經中脘見任脈總歌曰大敦上踝方交膕入股還陰不到腰抵腸屬肝方絡膽從肝貫膈復中焦愚按足厥陰肝之脈起於足大指聚毛之上循足跗上行與督脈會於巔其支者從期門注肺行中焦之分長六尺五寸交於手太陰肺經故手太陰之脈起於中焦中府穴始也穴歌曰足中厥陰肝經是大敦行間太衝始中封蠡溝中都傳膝關曲泉陰包里五里陰廉至章門相將直到期門止是動所生歌曰此經血多氣少焉是動腰疼俛仰難男疝女人少腹腫面塵晚色及咽乾所生病者為胸滿嘔逆洞泄小便艱或時遺溺並狐疝臨症還須仔細看靈樞第十篇云是動則病腰痛不可以俛仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵晚色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺癃閉為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也音釋蠡䯒𨇅頏顙㿗俛督脈之圖任脈之圖
