body:
  text: 卷中手太陰肺經之圖手太陰肺經歌手太陰肺之經腹走腋而腋走手是經多氣少血起於中府止於少商計十一穴左右共二十二穴肺之為藏六葉兩耳四垂如蓋附著於脊之第三椎中有二十四空行列分布諸臟清濁之氣為五臟華蓋雲手太陰經肺起寅中焦下絡大腸行還循胃口幽門穴上膈循行會本經靈樞第十篇雲手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺滑氏曰起發也絡繞也還循也循巡也又依也沿也屬會也中焦者在胃中脘當臍上四寸之分大腸注見本經胃口胃上下口也胃上口在臍上五寸上脘穴下口在臍上二寸下腋穴之分也膈者隔也凡人心下有膈膜與脊脅周回相著所以遮隔濁氣不使上熏於心肺也手太陰起於中焦受足厥陰之交由是循任脈之外足少陰經脈之裡以次下行當臍上一寸水分穴之分繞絡大腸手太陰陽明相為表裡乃復行本經之外上循胃口迤邐上膈而屬會於肺榮氣有所歸於本歲也幽門見腎經水分見任脈屬肺還從肺系出絡肺橫行來肘腋穴從中府過雲門循臑天府下俠白漸行心主少陰前肘中尺澤約紋偏靈樞第十篇去從肺系橫出腋下下循臑內行少陰心主之前下肘中滑氏曰肺系謂喉嚨也喉以候氣下接於肺肩下脅上際曰腋膊下對腋處為臑肩肘之間也臑盡處為肘臂節也自肺藏循肺系出而橫行循胸部第四行之中府雲門以出腋下下循臑內歷天府俠白行手少陰手心主之前下入肘中抵尺澤穴也蓋手少陰循臑臂出小指之端手心主循臑臂出中指之端手太陰則行手二經之前也中府在雲門下一寸乳上三肋間動脈應手陷中雲門取天突下一寸兩旁各六寸陷中動脈舉臂取之天突見任脈天府在腋下三寸臑內廉動脈中以鼻取之禁灸俠白在天府下去肘五寸動脈中尺澤在肘中約紋上動脈中循絲臂內到孔最骨間列缺交經傳寸口即是經渠穴掌後大淵魚際側出從大指少商頭靈樞第十篇云循臂內上骨下廉入寸口上魚可循魚際出大指之端滑氏曰肘以下為臂廉隅也邊也手掌後高骨旁動脈為關關前動脈為寸口曰魚曰魚際云者謂掌骨之前大指本即之後其肥肉隆起處統謂之魚魚際則其間之穴名也既下肘中乃循臂內上骨之下廉歷孔最列缺入寸口之經渠太淵以上魚循魚際出大指之端至少商穴而終也端杪也孔最去腕上七寸手太陰之郤列缺去腕側上一寸五分以手交叉食指末筋骨罅中太陰之絡別走陽明交經絡穴也經渠在寸口陷中禁灸太淵在掌後陷中脈之會也魚際在手大指本節後內側散脈中少商在手大指端內側白肉內宛宛中去爪甲如韭葉交手陽明大腸脈靈樞第十篇云其支者從腕後直出次指內廉出其端滑氏曰臂骨盡處為腕脈之大隧為經交經者為絡本經終於大指之端此則從腕後列缺穴達次指內廉出其端而交於手陽明大腸經總歌曰肺起中焦絡大腸還循胃口近心旁自知屬肺橫循腋出臂徐徐入少商愚按手太陰肺之脈起於中焦終於大指內廉端上其支音自腕後列缺穴直行於大指次指內廉出其端長三尺五寸交於手陽明大腸經故手陽明之脈起於大指次指之端商陽穴始也穴歌曰手太陰經十一穴中府雲門天府列俠白尺澤孔最存列缺經渠大淵涉魚際少商如韭葉是動所生歌曰此經多氣而少血是動則病喘與咳肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣嗽喘渴煩心腦滿結臑臂之內前廉痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦疼風汗出穴伸少氣不足息遺失無度溺變色靈樞第十篇云是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺斫生病者咳上氣喘渴煩心腦滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而缺熱虛則肩背痛寒少氣不足以息弱色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也滑氏所生病者咳咳下有嗽字前廉痛痛下無厥字風寒滑氏曰寒字疑衍溺色變下有卒遺失無度五字越人云經言脈有是動有所生病一脈變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是而動邪在血血為所生病氣主詬之血主濡之氣留而不行者為氣先病也血壅而不濡者為血後病也故先為是動後所生病也滑氏曰此脈字非尺寸之脈乃十二經隧之脈也後凡言是動所生病者義皆仿此音釋脘臑奴侯反膊音剝腕音緩瞀音茂腋音抑臂音閉迤音以邐音里杪音渺罅音腵手陽明大腸經之圖手陽明大腸經歌手陽明大腸之經手走頭而頭走腹是經氣血俱多起於商陽止於迎香計二十穴左右共四十穴大腸為腑長二丈一尺廣四寸當臍右回十六曲手陽明是大腸經商陽二間三間行合谷陽溪兩筋內靈樞第十篇雲手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上人兩筋之中滑氏曰大指次指大指之次指謂食指也手陽明大腸經也凡經脈之道陰脈行手足之裡陽脈行手足之表此經起於大指次指之端商陽穴受手太陰之交行於陽之分也由是循指之上廉歷二間三間以出合谷兩骨之間復上入陽溪兩筋之中商陽在手表大指次指內側去爪甲如韭葉二間在手表大指次指本節前內側陷中三間在手表大指次指本節後內側陷中合谷在手表大指次指岐骨間陷中動脈陽溪在手表腕中上側兩筋陷中循臂偏歷溫溜升下廉上廉三里去曲池肘髎來五里臂臑肩髃兩骨間靈樞第十篇云循臂上廉入肘外廉循臑外前廉上肩滑氏曰自陽溪而上循臂上廉之偏歷溫溜下廉上廉三里入肘外廉之曲池循臑外前廉歷肘髎五里臂臑絡臑會上肩至肩髃穴也臑會見手少陽經手陽明之絡也偏歷在腕中後三寸別走太陰溫溜取腕後小士六寸大士五寸間動脈中下廉在輔骨下去上廉一寸去曲池四寸上廉在三里下一寸三里在曲池下二寸按之肉起曲池在肘外輔骨屈肘曲骨之中以手拱胸取之肘髎在肘大骨外廉陷中五里在肘上三寸行向里大脈中禁針臂臑在肘上七寸䐃向端陽明之絡肩髃在肩端兩骨間陷者宛宛中舉臂有空陽明蹺脈之會巨骨上與大椎會靈樞第十篇云出髃骨之前廉上出於柱骨之會上滑氏曰肩端兩骨間為髃骨肩胛上際會處為天柱骨出髃骨前廉循巨骨穴上出柱骨之會上會於大椎大椎見督脈手足三陽督脈之會巨骨在肩端上行兩叉骨間陷中陽明蹺脈之會此經直下缺盆行陷中本屬是陽明陽明外絡繞肺臟下膈竟屬大腸停靈樞第十篇云下入缺盆絡肺下膈屬大腸滑氏曰自大椎而下入缺盆循足陽明經脈外絡繞肺臟復下膈當天樞之分會屬於大腸也缺盆天樞俱見足陽明經其支又自缺盆別上行天鼎扶突接貫腮及入於下齒靈樞第十篇云其支別者從缺盆上頭貫腮入下齒中滑氏曰頭莖為頸耳以下曲處為一口前小者為齒其支別者自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中天鼎在頸缺盆直扶突後一寸仰首取之扶突在氣舍後一寸五分又云在人迎後一寸五分仰首取之氣舍人迎見足陽明經上唇交互人中穴左右相交挾鼻孔任督手陽明會總禾髎一寸是迎香交足陽明經胃統靈樞第十篇云還出挾口交人中左之右右之左上挾鼻孔滑氏曰口唇上鼻柱下為人中既入齒縫復出夾兩口吻相交於人中之分左脈之右右脈之左上挾鼻孔循禾髎迎香而終以交於足陽明也人中見督脈手陽明督之會禾髎在鼻孔下俠水溝旁五分禁灸迎香在禾髎上一寸鼻孔旁五分手足陽明之會禁灸總歌曰手陽明脈起商陽過臂交肩絡大腸再出缺盆還入齒上行俠鼻到迎香愚按手陽明大陽之脈起於大指次指手表內側端上終於絡肺會屬大腸其支者從缺盆入於下齒左之右右之左相交頞中橫至兩目之下承泣穴長五尺交於足陽明胃經故足陽明之脈起於承泣穴始也穴歌曰手中陽明始商陽二間三間合谷藏陽溪偏歷及溫溜下廉上廉三里長曲池肘髎迎五里臂臑肩髃巨骨當天鼎扶突禾髎接終以迎香二十穴是動所生歌曰此經氣盛血亦盛是動頸腫並齒痛所生病者為鼻衄目黃口乾喉痹生大指次指難為用肩前臑外痛相仍靈樞第十篇云是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也音釋髃䐃渠殞也胛音甲背胛也頰右脅反結腮也吻音文上聲鼽音求鼻塞足陽明胃經之圖足陽明胃經歌足陽明胃之經頭走腹而腹走足足經氣血俱多起於承泣止於厲兌計四十五穴左右共九十穴胃大一尺五寸纖曲屈伸長二尺六寸足陽明起鼻睛明平足太陽少陽並是足陽明五脈會又足太陽顴上循斜行承泣目瞳子四白巨髎來上齒出環唇口地倉行交互承漿下唇會靈樞第十篇云足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿滑氏曰頗鼻莖也鼻山根為頗足陽明起於鼻兩旁迎香穴由是而上左右相交於頞中過睛明之分下循鼻外歷承泣四白巨髎入上齒中復出循地倉挾兩口吻環繞唇下左右相交於承漿之分也迎香見手陽明經睛明見足太陽經手足太陽少陽足陽明五脈之會承漿見任脈足陽明任脈之會承泣在目下七分直瞳於陷中足陽明任蹺脈之會禁針四白在目下一寸直瞳子巨髎在夾鼻孔旁八分直瞳子蹺脈之會地倉在夾口吻旁四分外如近下有微微動手足陽蹺脈之會卻循頤後大迎出斜上頰車下關客足陽明與少陽交發際頭維至顱額顳顬手足少陽經額顱督脈到神庭足太陽明三脈會靈樞第十篇云卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱滑氏曰腮下為頷頷中為頤囟前為髮際髮際前為額顱自承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際行懸釐頷厭之分經頭維會於額顱之神庭客主人懸釐頷厭並見足少陽經皆手足少陽陽明之交會神庭見督脈足太陽陽明督脈之會大迎在曲頷前一寸三分骨陷中動脈以口下當兩肩頰車在耳下曲頰端陷中側臥張口取之下關在客主人下耳前動脈下廉合口有空開口即閉足少陽之會客主人足見少陽經頭維在額角入髮際本神旁一寸五分神庭旁四寸五分足少陽交會本神見足少陽經神庭見督脈足太陽陽明督脈會足陽明脈自大迎行上終於此穴入神庭散腦中其支再下大人迎水突穴居氣舍上夾喉天突缺盆當循足少陰俞府行下膈屬胃上脘旁胃口會厭為吸門屬胃上脘足陽明會手太陰下一寸即由中脘是其經乃手太陽少陽合又同任脈會其穴絡脾微著左脅些相依胃上無差別靈樞第十篇云其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾胸兩旁高處為膺膺上橫骨為巨骨巨骨上陷中為缺盆其支別者從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾俞府見足少陰經上脘見任脈足陽明手太陽任脈之會中脘見任脈手太陽少陽足陽明所生任脈之會人迎在頸大脈動應手夾結喉旁一寸五分動脈仰首取之禁針灸水突在頸大筋前直人迎下氣舍上二穴之中間氣舍在頸直人迎下夾天突陷中天突見任脈缺盆在肩下橫骨陷中禁針直行又自缺盆底氣戶庫房並屋翳膺窗當乳乳根停斜入不容承滿位梁門穴過關門通太乙滑門天樞同挾臍外陵下大巨水道歸來入氣衝靈樞第十篇云其直者從缺盆下乳內廉下挾臍入氣衝中滑氏曰直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣衝中也自氣戶至乳根去中行各四寸自不容至滑肉門去中行各三寸自天樞至歸來去中行各二寸氣戶取天突下一寸兩旁各四寸微近下陷中直乳頭仰取天突見任脈庫房在氣戶下一寸六分陷中下直乳頭仰而取之屋翳在庫房下一寸六分陷中直乳頭仰而取之膺窗在屋翳下一寸六分陷中下直乳頭仰而取乳中當乳中是也禁針灸乳根在直乳下一寸六分陷中仰而取之自氣戶至乳根去中行各四寸不容取巨關兩旁各三寸直四肋端巨闕見任脈承滿在不容下一寸梁門在承滿下一寸關門在梁門下一寸太乙在關門下一寸滑肉門在太乙下一寸下挾臍自不容至滑肉門去中行各三寸天樞取臍兩旁各二寸大腸之募外陵在天樞下一寸大巨在外陵下一寸水道在大巨下三寸歸來在水道下二寸自天樞至日來去中行各二寸氣衝在歸來下鼠溪上一寸動脈應手宛宛中禁針一名氣衝其支腹從胃口下別行循腹肓俞走足少陰經與本經復會氣衝從下溜靈樞第十篇云其支者起胃下口循腹裡下至氣衝中而合滑氏曰胃下口下脘之分難經云太倉下口為幽門者是也自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下至氣衝中與前之入氣衝者合髀關伏兔陰市從梁丘膝上兩筋同膝臏犢鼻至三里上廉條口下廉中豐隆解溪衝陽屬陷谷內庭厲兌足靈樞第十篇云以下髃關抵伏兔下入膝臏中下循胻外廉下足跗入中指外間滑氏曰抵至也股外為髀髀前膝上起肉處為伏兔伏兔後交文為髀關挾膝解中為臏脛骨為䯒跗足面也既相合氣衝中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循䯒外廉之三里巨虛上廉條口巨虛下廉豐隆解溪下足跗之衝陽陷谷入中指外間之內庭至厲兌而終也髀關在膝上伏兔後交文分中禁灸伏兔在膝上六寸起肉端正跪坐而取之一云膝蓋上七寸禁灸陰市在膝上三寸伏兔下陷中拜而取之禁灸梁丘在膝上二寸兩筋間犢鼻在膝臏下䯒骨上骨解大筋中禁灸三里在膝眼下三寸䯒骨外廉大筋內宛宛中舉足取之極重按之則跗上動脈止矣上廉在裡下三寸舉足取之條口在下廉上一寸舉足取之禁灸下廉在上廉下三寸舉足取之豐隆在外踝上八寸䯒外廉陷中當繫鞋帶處解溪在衝陽後一寸五分腕上陷中當繫鞋帶處衝陽在足跗上五寸骨間動脈去陷谷三寸陷谷在足大指次指之間本節後陷中內庭在足大指次指外間陷中厲兌在足大指次指之端去爪甲如韭葉靈樞第十篇云其支者下膝三寸而別以下入中指外間滑氏曰此支自膝下三寸循三里穴之外衝陽反出行間來交足太陰脾脈續靈樞第十篇云其支者別跗上入大指間出其端滑氏曰此支自跗上衝陽穴別行大指間斜出足厥陰行間穴之外循大指下出其端以交於足太陰行間見足厥陰經總歌曰胃脈先由鼻頞中卻循頤後過喉嚨絡脾屬胃俠臍下下脛還知厲兌通愚按足陽明胃之脈起於鼻頞終於足大指次指端上其支者自跗上衝陽穴別行入足大指之下長八寸交於足太陰脾經故足太陰之脈起於大指之端內側隱白穴始也穴歌曰四十五穴足陽明承泣四白巨髎經地倉大迎頰車峙下關頭維人迎對水突氣舍連缺盆氣戶庫房屋翳屯膺窗乳中延乳根不容承滿梁門起關門太乙滑肉門天樞外陵大巨存水道歸來氣衝次髀關伏兔走陰市梁丘犢鼻足三里巨虛連條口位下巨虛兮及豐隆解溪衝陽陷谷中內庭厲競經穴終是動所動歌曰此經多氣復多血是動缺呻面顏黑悽悽惡寒畏見人忽聞木音心震惕登高而歌棄衣走甚則腹脹仍賁響凡此諸疾皆骭厥所生病者為狂瘧濕溫汗出鼻流血口喎唇疹仍喉痹膝臏疼痛腹脹結氣膺伏兔䯒外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振栗胃中寒時脹滿生氣盛身前皆有熱靈樞第十篇云是動則病灑灑振寒善呻數缺顏黑病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹永腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也音釋顳顬顱音盧囟也突防骨反觸也翳肓髀音陛股也臏犢髎頞音遏頷音順下也囟音信鼷獨骭音旱脛骨䯒峙足太陰脾經之圖足太陰脾經歌足太陰脾之經足走腹而腹走胸是經多氣少血起於隱白止於大包計二十一穴左右共四十二穴脾廣三寸長五寸掩乎太倉附著於脊之第十一椎足太陰經解隱白太都太白同其直公孫別走足陽明商丘踝下微前覓上踝三寸三陰交靈樞第十篇云足太陰之脈起於大指內側白肉際過核骨後上內踝前廉滑氏曰核骨一作核骨俗云孤拐骨是也足跟後兩旁起骨為踝骨足太陰起大指之端隱白穴受足陽之交也由是循大指內側白肉際大都穴過核骨歷太白公孫商丘上內踝前廉之三陰交也商丘在足內踝下微前陷中三陰交在內踝上三寸骨下陷中上腨循行漏谷超厥陰前有地機穴陰陵泉在膝之坳靈樞第十篇云上腨內循䯒骨後交出厥陰之前滑氏曰腨腓腸也由三陰交上腨內循䯒骨後之漏谷上行二寸交出足厥陰經之前至地機陰陵泉漏谷在內踝上六寸骨下陷中地機在膝下五寸太陰之郤陰陵泉在膝下內側輔骨下陷中伸足取曲膝亦得之上循膝股號血海箕門越筋陰股內上行入腹至衝門府舍橫行中極會關元任脈三陰還又循腸腹結在經歸大橫臍直下脘太陰任脈腹哀行腹哀在下日月是足太陽少陽訪陽維三會上期門直乳三陰屬脾臟循行中脘下脘回屬脾絡胃無猜疑此經本自腹哀起別腹還循膈上來靈樞第十篇云上循膝服內前廉入腹屬脾絡胃滑氏曰髀內為股臍上下為腹自陰陵泉上循膝股內前廉之血海箕門迤邐入腹經衝門府舍會中樞關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘下脘之際以屬脾絡骨也中極關元並見任脈皆足三陰任脈之會下脘見任脈足太陰任脈之會日月見足少陽經足太陰少陽陽維之會期門見足厥陰經足太陰厥陰陰維之會也血海在膝臏上內廉白肉際二寸中箕門在魚腹上越筋間陰股內動脈中衝門去大橫五寸在府舍下橫骨端約中動脈厥陰之會府舍在腹結下三寸太陰郤厥陰陰維之交會腹結在大橫下一寸三分大橫在腹哀下三寸五分直臍旁腹哀在日月下一寸五分自衝門起至腹哀止去腹中行各四寸五分日月見足少陽經斜上本經食竇穴舉臂可取天溪接仰取寸六是胸鄉更上周榮回下脅大包布脅九肋間手足太陰中府攢斜行竟上人迎位夾喉連舌散何難靈樞第十篇云上膈挾咽連舌本散舌下滑氏曰咽所以咽物居喉之前至胃長一尺六寸為胃系也舌本舌根也由腹哀上膈循食竇天溪胸鄉周榮由周榮外曲折向下至大包又自大包外曲折向上會中府上行人迎之裡挾咽連舌本散舌下而絡焉中府見手太陰經足太陰之會人迎見足陽明經食竇在天溪下一寸六分舉臂取之天溪在胸鄉下一寸六分仰而取之胸鄉在周榮下一寸六分陷中仰而取之周榮在中府下一寸六分陷中仰而取之中府見手太陰經大包在淵腋下三寸淵腋見足少陽經別支又從腹哀去再歷胃經中脘外上注膻中穴里終兩手少陰心經起靈樞第十篇云其支者復從胃別上膈注心中滑氏曰此支由腹哀別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰中脘膻中並見任脈總歌曰指端側內方由踝股脛崎嶇氣脈通入腹屬脾並絡胃俠咽連舌注胸中愚按足太陰脾之脈起於足大趾內側終於俠咽散舌下別支又自腹哀歷胃經注膻中之裡心之分交於手少陰心經故手少陰之脈起於心中上肺橫出腋下極泉始也穴歌曰足中太陰脾經偏隱白太都太白先公孫商丘三陰交漏谷地機陰陵泉血海箕門衝門近府舍腹結大橫連腹哀食竇天溪去胸鄉周榮大包全是動所生歌曰此經氣盛而血衰是動其病氣所為食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後與氣快然衰所生病者舌亦痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疽發身黃大指痿靈樞第十篇云是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也滑氏下急痛下有寒瘧二字音釋踝胡瓦反覓音密坳猜攢肋音勒拐腓手少陰心經之圖手少陰心經歌手少陰心之經腹走胸而胸走手是經多血少氣起於極泉止於少衝計九穴左右共一十八穴心形如未敷蓮花居肺下膈上附著於脊之第五椎手少陰心五臟通下膈絡繞小腸中靈樞第十篇雲手少陰之脈起於心中出屬心系下膈絡小腸滑氏曰心系有二一則上與肺相通而入肺兩大葉間一則由肺葉而下曲折向後並脊膂細絡相連貫脊髓與腎相通正當七節之間蓋五臟系皆通於心而心通五臟系也手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸別從心系橫支起上夾喉門目系同靈樞第十篇云其支者從心系上挾咽系目系滑氏曰支者從心系出任脈之外上行而挾咽系目也其支復從心系出上循肺上橫循腋極泉穴在臂內廂腋下筋間當動脈靈樞第十篇云其直者復從心系卻上肺出腋下滑氏曰直者復從心系直上至肺臟之分出循腋下抵極泉也極泉在臂內腋下筋間動脈入胸下循臑外後廉行太陰心主後青靈下肘內廉來少海靈樞第十篇云下循臑內後廉行太陰心主之後下肘內廉滑氏曰自極泉下循臑內後廉行太陰心主兩經之後歷青靈穴下肘內廉抵少海青靈在肘上三寸舉臂取之少海在肘內大骨外去肘端五分臂廉靈道甚分明通理排來陰郤底掌後神門循小指少府前行出少衝交手太陽小腸是靈樞第十篇云循臂內後廉抵掌後兌骨之端入掌內後廉循小指之內出其端滑氏曰腕下踝為兌骨自少海而下循臂內後廉歷靈道通理至掌後兌骨之端經陰郤神門入掌內廉至少府循小指端之少衝而終以交於手太陽也靈道在掌後一寸五分通理在腕後一寸陷中陰郤在掌後脈中去腕五分神門在掌後兌骨之端陷者中少府在手小指本節後陷中直勞宮少衝在手小指內廉端去爪甲如韭葉總歌曰心脈元來起膈中更還心系始通胸絡腸出腋方循肘入掌分明見少衝愚按手少陰心之脈起於心中終於小指內廉出其端長三尺五寸而直交於手太陽小腸經蓋心為君主之官示尊於他藏故其交經授受不假別支而直自本經少衝穴交於手太陽小腸經故手大陽之脈起於小指外側端少澤穴始也穴歌曰九穴心經手少陰極泉青靈少海深靈道通理陰郤遂神門少府少衝尋是動所生歌曰多氣少血屬此經是動心脾痛難任渴欲飲水咽乾燥所生脅痛目如金脅臂之內後廉痛掌中有熱向經尋靈樞第十篇云是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小於人迎也手太陽小腸經之圖手太陽小腸經歌手太陽小腸之經手走頭而頭走腹是經多血少氣起於少澤止於聽宮計十九穴左右共三十八穴小腸長三丈二尺左回疊積十六曲胃之下口小腸之上口也在臍上二寸水穀於是入焉復下一寸為水分穴則小腸下口也至是而泌別清濁水腋入膀胱滓穢入大腸云手太陽經絡小腸起於少澤小指旁前谷後溪循腕骨腕中陽谷陷中藏養老東骨上空罅靈樞第十篇雲手太陽之脈起於小指之端循手外側上腕出踝中滑氏曰臂骨盡處為腕腕下兌骨為踝本經起小指端少澤穴由是循手外側之前谷後溪上腕出踝中歷腕骨陽谷養老穴也少澤在手表小指外側端去爪甲一分陷中前谷在手表小指外側本節前陷中後溪在手表小指外側本節後陷中起肉之下腕骨在手表外側腋前起骨下陷中陽谷在手表外側腕中兌骨下陷中兌骨腕下骨也養老在手踝骨上一空腕後一寸陷中支正少陰來小海臑俞陽明手少陽膊部肩貞居骨解臑俞天宗與秉風曲垣肩外其肩中上行循臂大推穴手足三陽督脈同靈樞第十篇云直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上滑氏出肘內側起至循臑外後廉止無此十四字今録於此以備參考胛一名膊滑氏曰脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛自養老穴直上循臂骨下廉支正穴出肘內側兩骨之間歷小海穴上循臑外後廉行手陽明少陽之外上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴乃上會大椎因左右相交於兩肩之上大椎見督脈手足三陽督脈之會支正在腕後五寸別足少陰小海在肘內大骨外去肘端五分陷中屈手向頭取之肩貞在肩曲胛下兩骨解間肩髃後陷中臑俞在挾肩髎後大骨下胛上廉陷中手足太陽陽維蹺脈之會天髎見手少陽經天宗在秉風后大骨下陷中秉風在天髎外肩上小髃後舉臂有空手太陽陽明手足少陽之會天髎見手少陽經曲垣在肩中曲胛陷中按之應手痛肩外俞在肩胛上廉去脊三寸陷中肩中俞在肩胛內廉去脊二寸陷中就向肩前缺盆陷下腋絡心膻中滿循咽透膈抵胃中竟屬小腸來下脘靈樞第十篇云人缺盆絡心循咽下膈抵胃屬小腸滑氏曰自交肩上入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上脘中脘抵胃下行任脈之外當臍上二寸之分屬小腸膻中上脘中脘並見任脈會穴也其支別自缺盆升循頸天窗旁頸筋穴歷天容循頰面顴髎兌督聽宮停靈樞第十篇云其支者別從缺盆循頸上頰至目鋭眥卻入耳中滑氏曰目外角為鋭眥支者別從缺盆循頸之天窗天容上頰抵顴髎上至目鋭眥過瞳子髎卻入耳中循聽宮而終也瞳子髎見足少陽經天窗在頸大筋前曲頰下扶突後動脈應手陷中扶突見任天容在耳下曲頰後顴髎在面鳩骨下廉鋭骨端陷中手少陽之會聽宮在耳中珠子大如赤小豆足少陽之會別支循頰過䪼鼻循至睛明來眥內手足三陽五脈攢交足太陽膀胱位靈樞第十篇云其支者別頰上䪼抵鼻至目內眥斜絡於顴滑氏無斜絡於顴四字滑氏曰目下為䪼目大角為目內眥其支者別循頰上䪼抵鼻至目內眥睛明穴以交於足太陽也睛明見足太陽經總歌曰少澤因知手太陽上循盆內下連腸其支自頸斜交頰俠鼻還來目眥旁愚按手太陽小腸之脈起於小指之端循手外則而上終於耳中聽宮穴其支者自聽宮別行頰上抵鼻至目內眥長五尺交於足太陽故足太陽之脈起於目內眥睛明穴始也穴歌曰手太陽穴一十九少澤前谷後溪偶腕骨陽谷可養老支正小海肩貞走臑俞天宗及秉風曲垣肩外復肩中天窗天容上顴髎卻入耳中循聽宮是動所生歌曰此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑似折所生病主肩臑痛耳聾目黃腫腮頰肘臂之外後廉痛部外猶當細分則靈樞第十篇云是動則病嗌痛頷腫不可以顧肩似拔臑似折是主腋所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於以顧滑氏作回顧寸口也音釋罅音蝦膊音搏肩膊膻音誕與昶同䪼音拙廣眥靜計反
