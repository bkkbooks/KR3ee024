body:
  text: 凡例是編不但為砭焫而設蓋通察經穴脈絡之繇是以全論周身經脈雖則參考樞素諸篇而皆一本靈樞經脈之者故云經脈翼云十二經所列次第並以流注之序為之先後起子手大陰肺經終於足厥陰肝經附以任督二奇其有專穴也經脈歌括雜取竇太師洎諸家之言有裨於靈樞經脈之旨者大書列之仍分疏靈樞經文於下其經文分截一以靈樞本文為主仍取滑氏發揮所注附於經文之後以圈別之其諸穴絡與他經交會過脈者復以外圈隔之云見某經不復更贅經脈流注本經曰歷曰循曰至曰抵其交會者曰會曰過曰行其或經行之處既非本經又非交會則不以字例統之諸經之穴編入括中者今則隨所分截而大書開具行列明釋以便初學其諸取穴則參考樞素諸篇洎滑氏發揮而取之其有所取周折未易得者旁取針經集要等書附注以足之間一竊附己意一二以贅於下其言某穴在某所者完穴也取某穴上下者必屈伸偃仰坐臥跪彈而後得之也此與流注所經又不可以一例統之也後附總歌則雜取諸家相合之言演之仍以管見為愚按於下以紀一經之始末云經脈歌括有與經文分截不同者今則斷章求義以求其不皆或牽滯下文併為一句韻語者今則略加隱括嫠而為二但使之理平順不乖其義不計工拙諸家所明經穴有顛倒互釋而與流注次第不同者今亦皆改正不令矛盾靈樞所載本文是助所主之繇而滑氏折載有詳略不同者今一以靈樞為主而辨證滑氏之異於後奇經八脈雖不若十二經之有常道亦非若諸絡脈之微眇也任督二脈之直行者既以列之圖穴於諸經之後其陰陽維蹺沖帶六脈則別具編焉為其有六脈所發之穴今著於偏首以備參考上以上凡十條是編英自孩提時得先大父先人講論緒餘拳拳服膺録之手照閲三十年凡遇四方高明時加取正旁遘諸書參其所同去其所異必歸於正一得之見如是而已恐久散失不揣僣妄輯而成書敢用傳之壽梓與為人子者洎初學之士共之弘治丁巳長至日古杭夏英時彥謹識於杏花春曉亭
