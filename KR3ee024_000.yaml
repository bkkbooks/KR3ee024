front:
  text: 序人身之有脈絡流注以充其內外非聖人莫能知何以然脈絡人皆不可得而見者雖析其肌剖其膚莫之能有也惟聖人能探其所從來諳其所攸止是以靈樞經脈明著其實以開後學其功博哉蓋天之七政所歷九道非若經星麗天之有章而交會向背自無毫釐之差地之濟瀆所行一脈非若常流入海之可見而起伏出入自有分殊之別而人之榮衛所循周身雖非眉目在面之顯著而灌注之理又豈無其所自耶此聖人所以能洞察而衆人固莫知之耳夫何靈樞之文世古言深中有錯簡易置況無注釋後世不無失其真者此許昌滑氏十四經發揮所以作也仁和夏君時彥以世醫業儒讀書明理有契於是而愛之自惟醫之為道人之司命攸系苟不能知脈絡經穴之所繇不但施於針砭艾焫而已將何以察感受之因乎若昧昧焉以執方徒懵懵焉以耳目妄是猶傷胸捫足幾何而不誤人之疾戕人之生耶於是悉取祖遺諸祕有裨靈樞經脈之旨者若實太師諸家韻語更加演繹自成一家之言復疏靈樞本文於下就以滑氏注條列其次仍為總括以承之後附奇經八脈仰伏人尺寸間亦時出己意正其紛錯明其分截略加潤色而隱括之列圖分類粲然昭明名曰靈樞經脈翼展卷一覽皆在阿堵視發揮為益要較滑注為益明且以便於初學記誦猗歟快哉時彥知豫知其最詳書成出示以序囑豫豫告之曰傳有之云人莫不飲食也鮮能知味今時彥能以是用心可謂能味者乎祖述前賢而使後學有所憑據察病識源循經又疾曷啻飲上池而洞見五臟歟是雖滑氏鼓其波於前而時彥揚其濤於後是誠能羽翼乎靈樞而大有功於醫道也活人之德奚淺淺夫因紬繹其理敢用僣著於篇端云時弘治十年日南至古郯徐伯齡序
